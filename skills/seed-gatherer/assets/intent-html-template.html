<!DOCTYPE html>
<html lang="{{HTML_LANG}}">
<head>
  <meta charset="UTF-8">
  <title>{{T_TITLE_PREFIX}} — {{PROJECT_SLUG}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --fg:          #1a1a1a;
      --fg-muted:    #5a5a5a;
      --fg-soft:     #888;
      --bg:          #f7f7f5;
      --bg-card:     #fff;
      --accent:      #2b5fb5;
      --accent-soft: #e8f0fb;
      --good:        #2f7c4f;
      --good-soft:   #e6f4ec;
      --good-line:   #b6dcc4;
      --bad:         #b53737;
      --bad-soft:    #fbeaea;
      --bad-line:    #e6b8b8;
      --warn:        #b87900;
      --warn-soft:   #fff4d6;
      --warn-line:   #e8c870;
      --border:      #e0e0dc;
      --shadow:      0 1px 2px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
    }
    body {
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
            "Noto Sans KR", "Malgun Gothic", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--fg);
      background: var(--bg);
    }
    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 36px 32px 60px;
    }
    /* ── HEADER ─────────────────────────────────────────────── */
    header.doc-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 24px;
    }
    header.doc-head h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      color: var(--fg);
    }
    header.doc-head h1 .slug {
      color: var(--accent);
    }
    /* ── PIPELINE BREADCRUMB (chain ubiquitous vocabulary) ──── */
    .pipeline-wrap {
      margin: 0 0 18px;
    }
    .pipeline-svg {
      width: 100%;
      height: auto;
      max-height: 76px;
      display: block;
    }
    /* ── MODE BADGE (replaces text pill) ────────────────────── */
    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 6px 12px 6px 10px;
      border: 1px solid;
      border-radius: 8px;
      background: var(--accent-soft);
      font-size: 12px;
    }
    .mode-badge svg { flex: 0 0 20px; }
    .mode-badge .mode-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }
    .mode-badge .mode-text strong {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .mode-badge .mode-tagline {
      font-size: 11px;
      opacity: 0.78;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }
    /* ── STAT TAPE (at-a-glance counts) ─────────────────────── */
    .stat-tape-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 6px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }
    .stat-tape {
      width: 100%;
      height: auto;
      max-height: 64px;
      display: block;
    }
    /* ── FISHBONE ───────────────────────────────────────────── */
    .fishbone-svg {
      width: 100%;
      height: auto;
      max-height: 230px;
      display: block;
    }
    /* ── HERO BLOCK ─────────────────────────────────────────── */
    .hero {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
      padding: 22px 26px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
    }
    .hero .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--fg-soft);
      margin-bottom: 8px;
    }
    .hero .goal {
      font-size: 19px;
      font-weight: 500;
      line-height: 1.45;
      color: var(--fg);
      margin: 0 0 14px;
    }
    .hero .persona {
      font-size: 14px;
      color: var(--fg-muted);
      margin: 0;
    }
    .hero .persona strong {
      color: var(--fg);
      font-weight: 600;
    }
    /* ── SCOPE GRID (✓ in / ✗ out) ──────────────────────────── */
    .scope-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .scope-col {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .scope-col.in  { border-top: 3px solid var(--good); }
    .scope-col.out { border-top: 3px solid var(--bad); }
    .scope-col h2 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .scope-col.in  h2 { color: var(--good); }
    .scope-col.out h2 { color: var(--bad); }
    .scope-col ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .scope-col li {
      position: relative;
      padding: 6px 0 6px 22px;
      font-size: 14px;
      line-height: 1.5;
      border-bottom: 1px dashed var(--border);
    }
    .scope-col li:last-child { border-bottom: none; }
    .scope-col.in  li::before {
      content: "✓";
      position: absolute;
      left: 0;
      top: 6px;
      color: var(--good);
      font-weight: 700;
    }
    .scope-col.out li::before {
      content: "✗";
      position: absolute;
      left: 0;
      top: 6px;
      color: var(--bad);
      font-weight: 700;
    }
    /* ── PANEL (generic card) ───────────────────────────────── */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 22px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }
    .panel > h2 {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--fg-soft);
    }
    /* ── SUCCESS CRITERIA AS CHECKLIST ──────────────────────── */
    .checklist {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .checklist li {
      position: relative;
      padding: 8px 0 8px 28px;
      font-size: 14.5px;
      border-bottom: 1px dashed var(--border);
    }
    .checklist li:last-child { border-bottom: none; }
    .checklist li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 11px;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--accent);
      border-radius: 3px;
      background: var(--bg-card);
    }
    /* ── CONSTRAINTS AS BARE LIST ───────────────────────────── */
    .constraint-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .constraint-list li {
      position: relative;
      padding: 5px 0 5px 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    .constraint-list li::before {
      content: "▸";
      position: absolute;
      left: 0;
      top: 5px;
      color: var(--accent);
    }
    /* ── EXAMPLES (paired ✓ / ✗) ────────────────────────────── */
    .ex-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .ex-col {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }
    .ex-col h2 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .ex-col.good h2 { color: var(--good); }
    .ex-col.bad  h2 { color: var(--bad);  }
    .ex-item {
      padding: 10px 12px;
      border-radius: 5px;
      margin-bottom: 8px;
      font-size: 13.5px;
      line-height: 1.5;
    }
    .ex-item:last-child { margin-bottom: 0; }
    .ex-col.good .ex-item { background: var(--good-soft); border-left: 3px solid var(--good); }
    .ex-col.bad  .ex-item { background: var(--bad-soft);  border-left: 3px solid var(--bad);  }
    /* ── OPEN QUESTIONS (loud call-to-action) ───────────────── */
    .open-questions {
      background: var(--warn-soft);
      border: 1px solid var(--warn-line);
      border-left: 5px solid var(--warn);
      border-radius: 8px;
      padding: 18px 22px;
      margin-bottom: 28px;
    }
    .open-questions > h2 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 700;
      color: var(--warn);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .open-questions > h2::before {
      content: "⚠";
      font-size: 18px;
    }
    .open-questions ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .open-questions li {
      padding: 6px 0;
      font-size: 14.5px;
      line-height: 1.5;
      border-bottom: 1px dashed var(--warn-line);
    }
    .open-questions li:last-child { border-bottom: none; }
    /* ── PLACEHOLDERS (when state is sparse) ────────────────── */
    .placeholder {
      color: var(--fg-soft);
      font-style: italic;
      font-size: 13.5px;
    }
    /* ── FOOTER ─────────────────────────────────────────────── */
    footer.doc-foot {
      margin-top: 32px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--fg-soft);
      text-align: center;
    }
    /* ── PRINT ──────────────────────────────────────────────── */
    @media print {
      body { background: #fff; }
      .page { padding: 0; max-width: none; }
      .hero, .panel, .scope-col, .ex-col, .open-questions {
        box-shadow: none;
        page-break-inside: avoid;
      }
    }
    /* ── NARROW ─────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .scope-grid, .ex-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="page">

<div class="pipeline-wrap">{{PIPELINE_SVG}}</div>

<header class="doc-head">
  <h1>{{T_TITLE_PREFIX}} — <span class="slug">{{PROJECT_SLUG}}</span></h1>
  {{MODE_BADGE}}
</header>

<div class="stat-tape-wrap">{{STAT_TAPE}}</div>

{{HERO_BLOCK}}
{{SCOPE_BLOCK}}
{{SUCCESS_BLOCK}}
{{CONSTRAINTS_BLOCK}}
{{ROOT_CAUSE_BLOCK}}
{{EXAMPLES_BLOCK}}
{{OPEN_QUESTIONS_BLOCK}}

<footer class="doc-foot">
  {{T_VERIFIED_AT}} <code>{{VERIFIED_AT}}</code>
</footer>

</div>
</body>
</html>
